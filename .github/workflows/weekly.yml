name: Generate KOCSKIN Weekly Report

on:
  schedule:
    - cron: '10 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: weekly-report
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      did_publish: ${{ steps.run.outputs.did_publish }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node (for staticrypt)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run generator
        id: run
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          REPORT_PASSWORD: ${{ secrets.REPORT_PASSWORD }}
          DRIVE_FOLDER_NAME: ${{ vars.DRIVE_FOLDER_NAME || 'KOCSKIN_週報' }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_AD_ACCOUNT_ID: ${{ secrets.FB_AD_ACCOUNT_ID }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: |
          set +e
          python generate_report.py
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" = "0" ]; then
            echo "did_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$rc" = "2" ] || [ "$rc" = "3" ]; then
            echo "did_publish=false" >> "$GITHUB_OUTPUT"
            echo "Skipping publish (exit $rc)"
            exit 0
          else
            echo "did_publish=false" >> "$GITHUB_OUTPUT"
            exit $rc
          fi

      - name: Commit state + log + dist
        if: steps.run.outputs.did_publish == 'true'
        run: |
          git config user.name "kocskin-report-bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin main
          echo "=== REMOTE HEAD ==="
          git log --oneline -2 origin/main
          echo "=== LOCAL HEAD ==="
          git log --oneline -2 HEAD
          git reset --soft origin/main
          git add state/history.json state/last_run.json logs/ dist/index.html || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(report): auto-update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "=== AFTER COMMIT ==="
            git log --oneline -2 HEAD
            echo "=== PUSHING ==="
            git push --force-with-lease || git push --force
          fi

      - name: Upload Pages artifact
        if: steps.run.outputs.did_publish == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: generate
    if: needs.generate.outputs.did_publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: pages
        uses: actions/deploy-pages@v4

      - name: Telegram notification
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="✅ KOCSKIN 週報已更新%0A📊 https://welsonchen0704.github.io/kocskin-reports/%0A🕐 $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="${MSG}" \
            -d parse_mode="" > /dev/null
